<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <meta name="theme-color" content="#0d0b09" />

    <meta name="description" content="Turn your cook log into a share-ready card — temperature curve, probe readouts, and pitmaster credit." />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pitwright · Share Your Cook" />
    <meta property="og:description" content="Turn your cook log into a share-ready card — temperature curve, probe readouts, and pitmaster credit." />
    <!-- Relative path resolves against the deploy origin. Some scrapers (older Facebook)
         want an absolute URL — set it to https://<your-domain>/og-image.png in prod. -->
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- PWA - update public/manifest.json and replace icons in public/icons/ -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pitwright" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,600&family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <title>Pitwright · Share Your Cook</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
